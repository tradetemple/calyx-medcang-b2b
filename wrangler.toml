#:schema node_modules/@opennextjs/cloudflare/wrangler-schema.json
name = "calyx-medical"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# OpenNext configuration
# The worker script is generated by @opennextjs/cloudflare
main = ".open-next/worker.js"

# Assets configuration
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Environment variables (set these in Cloudflare dashboard or .dev.vars for local)
# Required variables:
# - NEXT_PUBLIC_SUPABASE_URL
# - SUPABASE_SERVICE_ROLE_KEY
# - STRIPE_SECRET_KEY
# - STRIPE_PUBLISHABLE_KEY
# - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
# - GOOGLE_API_KEY
# - GOOGLE_GEMINI_API_KEY
# - RESEND_API_KEY
# - etc.

[[kv_namespaces]]
binding = "NEXT_CACHE_WORKERS_KV"
id = "836fad400aff4a9d8aeae85c49e03904"

[[r2_buckets]]
bucket_name = "next-inc-cache"
binding = "NEXT_INC_CACHE_R2_BUCKET"

# Observability (optional)
[observability]
enabled = true
