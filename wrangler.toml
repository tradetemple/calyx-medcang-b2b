#:schema node_modules/@opennextjs/cloudflare/wrangler-schema.json
name = "calyx-medcang-b2b"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# OpenNext configuration
# The worker script is generated by @opennextjs/cloudflare
main = ".open-next/worker.js"

# Assets configuration
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Environment variables (set these in Cloudflare dashboard or .dev.vars for local)
# Required variables:
# - ALLOWED_ORIGINS
# - CRON_SECRET
# - NODE_ENV
# - etc.

[[kv_namespaces]]
"binding": "KV_BINDING",
"id": "836fad400aff4a9d8aeae85c49e03904"

# Observability (optional)
[observability]
enabled = true
